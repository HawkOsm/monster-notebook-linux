conky.config = {
    alignment = 'top_right',
    xinerama_head = 0,
    background = true,
    double_buffer = true,
    update_interval = 2,
    use_xft = true,
    xftalpha = 1,

    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    gap_x = 40,
    gap_y = 40,
    minimum_width = 360,
    border_inner_margin = 0,
    border_outer_margin = 0,

    default_bar_height = 3,
    default_bar_width = 360,

    -- light text on transparent (dark desktop)
    default_color = 'CCCCCC',
    color1 = 'FFFFFF',      -- values
    color2 = 'AAAAAA',      -- section labels (light gray, no blue)
    color3 = '555555',      -- secondary / units
    color4 = '888888',      -- bar fill

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    font = 'Ubuntu Sans:size=10',
}

conky.text = [[
${voffset 6}${color2}KERN${color}   ${color1}${kernel}${color}
${color2}UP${color}     ${color1}${uptime}${color}
${color2}IP${color}     ${color1}${addr wlp0s20f3}${color}

${voffset 8}${color2}CPU${color}   ${color1}${cpu}%${color3}   ${freq_g} GHz${color}
${color4}${cpubar 3,360}${color}

${voffset 4}${color2}TEMP${color}  ${color1}${execi 4 ~/.local/bin/cpu-temp.sh}°C${color3}   scale 0–100°C${color}
${color4}${execibar 4 ~/.local/bin/cpu-temp.sh}${color}

${voffset 8}${color2}CORES${color}${color3}   P0–P11 (HT) · E12–E19 · LP20–21${color}
${font Ubuntu Mono:size=9}${color3}P00${color} ${cpubar cpu1 4,60} ${color1}${cpu cpu1}%${goto 190}${color3}P01${color} ${cpubar cpu2 4,60} ${color1}${cpu cpu2}%${color}
${color3}P02${color} ${cpubar cpu3 4,60} ${color1}${cpu cpu3}%${goto 190}${color3}P03${color} ${cpubar cpu4 4,60} ${color1}${cpu cpu4}%${color}
${color3}P04${color} ${cpubar cpu5 4,60} ${color1}${cpu cpu5}%${goto 190}${color3}P05${color} ${cpubar cpu6 4,60} ${color1}${cpu cpu6}%${color}
${color3}P06${color} ${cpubar cpu7 4,60} ${color1}${cpu cpu7}%${goto 190}${color3}P07${color} ${cpubar cpu8 4,60} ${color1}${cpu cpu8}%${color}
${color3}P08${color} ${cpubar cpu9 4,60} ${color1}${cpu cpu9}%${goto 190}${color3}P09${color} ${cpubar cpu10 4,60} ${color1}${cpu cpu10}%${color}
${color3}P10${color} ${cpubar cpu11 4,60} ${color1}${cpu cpu11}%${goto 190}${color3}P11${color} ${cpubar cpu12 4,60} ${color1}${cpu cpu12}%${color}
${color3}E12${color} ${cpubar cpu13 4,60} ${color1}${cpu cpu13}%${goto 190}${color3}E13${color} ${cpubar cpu14 4,60} ${color1}${cpu cpu14}%${color}
${color3}E14${color} ${cpubar cpu15 4,60} ${color1}${cpu cpu15}%${goto 190}${color3}E15${color} ${cpubar cpu16 4,60} ${color1}${cpu cpu16}%${color}
${color3}E16${color} ${cpubar cpu17 4,60} ${color1}${cpu cpu17}%${goto 190}${color3}E17${color} ${cpubar cpu18 4,60} ${color1}${cpu cpu18}%${color}
${color3}E18${color} ${cpubar cpu19 4,60} ${color1}${cpu cpu19}%${goto 190}${color3}E19${color} ${cpubar cpu20 4,60} ${color1}${cpu cpu20}%${color}
${color3}L20${color} ${cpubar cpu21 4,60} ${color1}${cpu cpu21}%${goto 190}${color3}L21${color} ${cpubar cpu22 4,60} ${color1}${cpu cpu22}%${color}${font}

${voffset 6}${color2}GPU${color}   ${color1}${execi 5 ~/.local/bin/gpu-stat.sh usage}%${color3}   ${execi 5 ~/.local/bin/gpu-stat.sh freq} MHz${color}
${color4}${execbar 5 ~/.local/bin/gpu-stat.sh usage}${color}

${voffset 4}${color2}TEMP${color}  ${color1}${execi 8 ~/.local/bin/gpu-stat.sh temp}°C${color3}   scale 0–100°C${color}
${color4}${execibar 8 ~/.local/bin/gpu-stat.sh temp_pct}${color}

${voffset 4}${color2}ENGINES${color}${color3}   GR · MEM · ENC · DEC · VRM · PWR${color}
${font Ubuntu Mono:size=9}${color3}GR ${color} ${execibar 5 4,60 ~/.local/bin/gpu-stat.sh usage} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh usage}%${goto 190}${color3}MEM${color} ${execibar 5 4,60 ~/.local/bin/gpu-stat.sh mem_util} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh mem_util}%${color}
${color3}ENC${color} ${execibar 5 4,60 ~/.local/bin/gpu-stat.sh enc_util} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh enc_util}%${goto 190}${color3}DEC${color} ${execibar 5 4,60 ~/.local/bin/gpu-stat.sh dec_util} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh dec_util}%${color}
${color3}VRM${color} ${execibar 5 4,60 ~/.local/bin/gpu-stat.sh vram_pct} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh vram_pct}%${goto 190}${color3}PWR${color} ${execibar 5 4,60 ~/.local/bin/gpu-stat.sh power_pct} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh power_draw}W${color}${font}

${voffset 10}${color2}RAM${color}   ${color1}${memperc}%${color3}   ${mem} / ${memmax}${color}
${color4}${membar 3,360}${color}

${voffset 10}${color2}NET${color}   ${color3}${font DejaVu Sans:size=10}▲${font} ${color1}${upspeed wlp0s20f3}${color3}   ${font DejaVu Sans:size=10}▼${font} ${color1}${downspeed wlp0s20f3}${color}

${voffset 10}${color2}DSK${color}
${color3}  /${color}        ${color1}${fs_used_perc /}%${color3}   ${fs_used /} / ${fs_size /}${color}
${color4}${fs_bar 3,360 /}${color}
${color3}  /home${color}   ${color1}${fs_used_perc /home}%${color3}   ${fs_used /home} / ${fs_size /home}${color}
${color4}${fs_bar 3,360 /home}${color}
]]
