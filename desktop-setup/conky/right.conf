conky.config = {
    alignment = 'top_right',
    -- NOTE: positioned on the built-in laptop screen by conky-launch.sh
    -- (absolute -x/-y), so xinerama_head is intentionally omitted.
    background = false,   -- GNOME/Wayland: background=true (daemonize) leaves the XWayland window un-composited (renders but never shown); foreground maps correctly
    double_buffer = true,
    update_interval = 2,
    use_xft = true,
    xftalpha = 1,
    -- NOTE: use_xft=true enables TrueType/fontconfig fonts and Turkish character support.
    -- If layout scales 2.5x on HiDPI (Xft.dpi=240), reduce font sizes proportionally (÷2.5).

    own_window = true,
    own_window_type = 'normal',   -- 'desktop' is hidden behind Ubuntu's Desktop Icons (DING) on GNOME Wayland; 'normal' + the 'below' hint sits on the desktop yet stays visible
    own_window_transparent = false,   -- Wayland/XWayland: true => window never composites (invisible); false + argb_value=0 keeps the box-less transparent look while rendering
    own_window_argb_visual = true,
    own_window_colour = '000000',
    own_window_argb_value = 255,  -- opaque: true transparency is unsupported for conky on GNOME/Wayland (bug brndnmtthws/conky#2301, WON'T FIX). Opaque black is invisible on the black desktop; white text floats.
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    gap_x = 30,
    gap_y = 30,
    -- FIXED geometry: min == max width + min height covering full content so
    -- the window NEVER auto-resizes — dynamic resize under the pointer was
    -- corrupting the mouse cursor size on GNOME/XWayland (2026-07-09).
    minimum_width = 540,
    maximum_width = 540,
    minimum_height = 950,
    border_inner_margin = 0,
    border_outer_margin = 0,

    default_bar_height = 5,
    default_bar_width = 540,

    -- light text on transparent (dark desktop)
    default_color = 'FFFFFF',
    color1 = 'FFFFFF',      -- values
    color2 = 'CCCCCC',      -- section labels (light gray)
    color3 = '999999',      -- secondary / units (visible on black)
    color4 = 'BBBBBB',      -- bar fill

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    font = 'Ubuntu Mono:size=12',
}

conky.text = [[
${voffset 9}${color2}KERN${color}   ${color1}${kernel}${color}
${color2}UP${color}     ${color1}${uptime}${color}
${color2}IP${color}     ${color1}${addr wlp0s20f3}${color}

${voffset 12}${color2}CPU${color}   ${color1}${cpu}%${color3}   ${freq_g} GHz${color}
${color4}${cpubar 5,540}${color}

${voffset 6}${color2}TEMP${color}  ${color1}${execi 4 ~/.local/bin/cpu-temp.sh}°C${color3}   scale 0–100°C${color}
${color4}${execibar 4 ~/.local/bin/cpu-temp.sh}${color}

${voffset 12}${color2}CORES${color}${color3}   P0–P11 (HT) · E12–E19 · LP20–21${color}
${font Ubuntu Mono:size=12}${color3}P00${color} ${cpubar cpu1 6,90} ${color1}${cpu cpu1}%${goto 285}${color3}P01${color} ${cpubar cpu2 6,90} ${color1}${cpu cpu2}%${color}
${color3}P02${color} ${cpubar cpu3 6,90} ${color1}${cpu cpu3}%${goto 285}${color3}P03${color} ${cpubar cpu4 6,90} ${color1}${cpu cpu4}%${color}
${color3}P04${color} ${cpubar cpu5 6,90} ${color1}${cpu cpu5}%${goto 285}${color3}P05${color} ${cpubar cpu6 6,90} ${color1}${cpu cpu6}%${color}
${color3}P06${color} ${cpubar cpu7 6,90} ${color1}${cpu cpu7}%${goto 285}${color3}P07${color} ${cpubar cpu8 6,90} ${color1}${cpu cpu8}%${color}
${color3}P08${color} ${cpubar cpu9 6,90} ${color1}${cpu cpu9}%${goto 285}${color3}P09${color} ${cpubar cpu10 6,90} ${color1}${cpu cpu10}%${color}
${color3}P10${color} ${cpubar cpu11 6,90} ${color1}${cpu cpu11}%${goto 285}${color3}P11${color} ${cpubar cpu12 6,90} ${color1}${cpu cpu12}%${color}
${color3}E12${color} ${cpubar cpu13 6,90} ${color1}${cpu cpu13}%${goto 285}${color3}E13${color} ${cpubar cpu14 6,90} ${color1}${cpu cpu14}%${color}
${color3}E14${color} ${cpubar cpu15 6,90} ${color1}${cpu cpu15}%${goto 285}${color3}E15${color} ${cpubar cpu16 6,90} ${color1}${cpu cpu16}%${color}
${color3}E16${color} ${cpubar cpu17 6,90} ${color1}${cpu cpu17}%${goto 285}${color3}E17${color} ${cpubar cpu18 6,90} ${color1}${cpu cpu18}%${color}
${color3}E18${color} ${cpubar cpu19 6,90} ${color1}${cpu cpu19}%${goto 285}${color3}E19${color} ${cpubar cpu20 6,90} ${color1}${cpu cpu20}%${color}
${color3}L20${color} ${cpubar cpu21 6,90} ${color1}${cpu cpu21}%${goto 285}${color3}L21${color} ${cpubar cpu22 6,90} ${color1}${cpu cpu22}%${color}${font}

${voffset 9}${color2}GPU${color}   ${color1}${execi 5 ~/.local/bin/gpu-stat.sh usage}%${color3}   ${execi 5 ~/.local/bin/gpu-stat.sh freq} MHz${color}
${color4}${execbar 5 ~/.local/bin/gpu-stat.sh usage}${color}

${voffset 6}${color2}TEMP${color}  ${color1}${execi 8 ~/.local/bin/gpu-stat.sh temp}°C${color3}   scale 0–100°C${color}
${color4}${execibar 8 ~/.local/bin/gpu-stat.sh temp_pct}${color}

${voffset 6}${color2}ENGINES${color}${color3}   GR · MEM · ENC · DEC · VRM · PWR${color}
${font Ubuntu Mono:size=12}${color3}GR ${color} ${execibar 5 6,90 ~/.local/bin/gpu-stat.sh usage} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh usage}%${goto 285}${color3}MEM${color} ${execibar 5 6,90 ~/.local/bin/gpu-stat.sh mem_util} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh mem_util}%${color}
${color3}ENC${color} ${execibar 5 6,90 ~/.local/bin/gpu-stat.sh enc_util} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh enc_util}%${goto 285}${color3}DEC${color} ${execibar 5 6,90 ~/.local/bin/gpu-stat.sh dec_util} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh dec_util}%${color}
${color3}VRM${color} ${execibar 5 6,90 ~/.local/bin/gpu-stat.sh vram_pct} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh vram_pct}%${goto 285}${color3}PWR${color} ${execibar 5 6,90 ~/.local/bin/gpu-stat.sh power_pct} ${color1}${execi 5 ~/.local/bin/gpu-stat.sh power_draw}W${color}${font}

${voffset 15}${color2}RAM${color}   ${color1}${memperc}%${color3}   ${mem} / ${memmax}${color}
${color4}${membar 5,540}${color}

${voffset 15}${color2}NET${color}   ${color3}${font DejaVu Sans:size=15}▲${font} ${color1}${upspeed wlp0s20f3}${color3}   ${font DejaVu Sans:size=15}▼${font} ${color1}${downspeed wlp0s20f3}${color}

${voffset 15}${color2}DSK${color}
${color3}  root${color}    ${color1}${fs_used_perc /}%${color3}   ${fs_used /} / ${fs_size /}${color}
${color4}${fs_bar 5,540 /}${color}
${color3}  depo${color}    ${color1}${fs_used_perc /mnt/disk2}%${color3}   ${fs_used /mnt/disk2} / ${fs_size /mnt/disk2}${color}
${color4}${fs_bar 5,540 /mnt/disk2}${color}
]]
