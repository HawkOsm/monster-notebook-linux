conky.config = {
    alignment = 'top_left',
    xinerama_head = 0,
    background = true,
    double_buffer = true,
    update_interval = 5,
    use_xft = true,
    xftalpha = 1,

    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    gap_x = 50,
    gap_y = 50,
    minimum_width = 300,
    border_inner_margin = 0,
    border_outer_margin = 0,

    -- light text on transparent (dark desktop)
    default_color = 'C8C8C8',
    color1 = 'FFFFFF',      -- todo tasks  (white)
    color2 = '707070',      -- date header  (gray)
    color3 = '505050',      -- done tasks   (dim)
    color4 = '666666',      -- edit hint    (gray, no blue)

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    font = 'Ubuntu Sans:size=11',
}

conky.text = [[
${color2}${font Ubuntu Sans:Bold:size=9}${time %A, %-d %B}${font}${color}
${voffset 10}${execpi 30 ~/.local/bin/conky-agenda-render.sh}
${voffset 14}${color4}${font Ubuntu Sans:size=8}ctrl+alt+N  ·  edit in obsidian${font}${color}
]]
