conky.config = {
    alignment = 'top_left',
    -- NOTE: positioned on the built-in laptop screen by conky-launch.sh
    -- (absolute -x/-y), so xinerama_head is intentionally omitted.
    background = false,   -- GNOME/Wayland: background=true (daemonize) leaves the XWayland window un-composited (renders but never shown); foreground maps correctly
    double_buffer = true,
    update_interval = 5,
    use_xft = true,
    xftalpha = 1,
    -- NOTE: use_xft=true enables TrueType/fontconfig fonts and Turkish character support.
    -- If layout scales 2.5x on HiDPI (Xft.dpi=240), reduce font sizes proportionally (÷2.5).

    own_window = true,
    own_window_type = 'normal',   -- 'desktop' is hidden behind Ubuntu's Desktop Icons (DING) on GNOME Wayland; 'normal' + the 'below' hint sits on the desktop yet stays visible
    own_window_transparent = false,   -- Wayland/XWayland: true => window never composites (invisible); false + argb_value=0 keeps the box-less transparent look while rendering
    own_window_argb_visual = true,
    own_window_colour = '000000',
    own_window_argb_value = 255,  -- opaque: true transparency is unsupported for conky on GNOME/Wayland (bug brndnmtthws/conky#2301, WON'T FIX). Opaque black is invisible on the black desktop; white text floats.
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',

    gap_x = 30,
    gap_y = 30,
    -- FIXED geometry: min == max width + generous min height so the window
    -- NEVER auto-resizes with content — dynamic resize under the pointer was
    -- corrupting the mouse cursor size on GNOME/XWayland (2026-07-09).
    minimum_width = 640,
    maximum_width = 640,
    minimum_height = 500,
    border_inner_margin = 0,
    border_outer_margin = 0,

    -- light text on transparent (dark desktop)
    default_color = 'FFFFFF',
    color1 = 'FFFFFF',      -- todo tasks  (white)
    color2 = 'CCCCCC',      -- date header  (light gray)
    color3 = '999999',      -- done tasks   (mid gray, visible on black)
    color4 = 'AAAAAA',      -- edit hint    (light gray)

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = false,

    font = 'Ubuntu Mono:size=13',
}

conky.text = [[
${color2}${font Ubuntu Mono:Bold:size=12}${time %A, %-d %B}${font}${color}
${voffset 15}${execpi 30 ~/.local/bin/conky-agenda-render.sh}
${voffset 20}${color4}${font Ubuntu Mono:size=11}ctrl+alt+N  ·  obsidian'da düzenle${font}${color}
]]
